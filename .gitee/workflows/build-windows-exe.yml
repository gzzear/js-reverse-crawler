version: '1.0'
name: build-windows-exe
displayName: Build Windows EXE

trigger:
  push:
    branches:
      - main
    paths:
      - 'js 逆向/pdd/采集数据/parse_to_excel_gui_v4.py'
  tag:
    prefix: 'v'

stages:
  - name: build
    strategy:
      windows:
        - windows-latest
    jobs:
      - name: build-exe
        steps:
          - name: checkout
            uses: actions/checkout@v4

          - name: setup-python
            uses: actions/setup-python@v5
            with:
              python-version: '3.11'

          - name: install-deps
            run: |
              python -m pip install --upgrade pip
              pip install pyinstaller requests openpyxl Pillow

          - name: build-exe
            run: |
              cd "js 逆向/pdd/采集数据"
              pyinstaller --onefile --name parse_to_excel_v4 parse_to_excel_gui_v4.py

          - name: upload-artifact
            uses: actions/upload-artifact@v4
            with:
              name: parse_to_excel_v4.exe
              path: js 逆向/pdd/采集数据/dist/parse_to_excel_v4.exe
              retention-days: 30
