name: Build PDD Collector EXE

on:
  push:
    tags:
      - 'collector-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r js逆向/拼多多/protocol_collector/requirements.txt
        pip install pyinstaller>=6.0
        
    - name: Build EXE with PyInstaller
      shell: pwsh
      run: |
        cd js逆向/拼多多/protocol_collector
        pyinstaller --clean `
          --name "拼多多协议采集工具" `
          --windowed `
          --onefile `
          --add-data "ui/styles.qss;ui" `
          --add-data "signer/templates;signer/templates" `
          --hidden-import=PyQt6 `
          --hidden-import=PyQt6.QtCore `
          --hidden-import=PyQt6.QtGui `
          --hidden-import=PyQt6.QtWidgets `
          --hidden-import=httpx `
          --hidden-import=httpcore `
          --hidden-import=certifi `
          --collect-all=PyQt6 `
          main.py
        
    - name: Verify build
      shell: pwsh
      run: |
        if (Test-Path "dist/拼多多协议采集工具.exe") {
          Write-Host "✓ Build successful!"
          Get-Item "dist/拼多多协议采集工具.exe" | Select-Object Name, Length
        } else {
          Write-Error "✗ Build failed - EXE not found"
          dir dist
          exit 1
        }
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pdd-collector-${{ github.event.inputs.version || github.ref_name }}
        path: js逆向/拼多多/protocol_collector/dist/拼多多协议采集工具.exe
        retention-days: 30
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        name: 拼多多协议采集工具 ${{ github.event.inputs.version || github.ref_name }}
        files: js逆向/拼多多/protocol_collector/dist/拼多多协议采集工具.exe
        generate_release_notes: true
        draft: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
