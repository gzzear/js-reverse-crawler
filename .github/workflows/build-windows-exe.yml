name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Debug - List all files
      run: |
        Write-Host "`n=== ROOT DIRECTORY ==="
        Get-ChildItem -Force | ForEach-Object { Write-Host "  $($_.Name)" }
        
        Write-Host "`n=== pdd_tool DIRECTORY ==="
        if (Test-Path "pdd_tool") {
          Get-ChildItem "pdd_tool" -Force | ForEach-Object { Write-Host "  $($_.Name)" }
        } else {
          Write-Host "  ERROR: pdd_tool not found!"
          Get-ChildItem -Recurse -Filter "parse_to_excel*.py" | ForEach-Object {
            Write-Host "  Found: $($_.FullName)"
          }
        }
    
    - name: Install dependencies
      run: |
        Write-Host "`n=== INSTALLING DEPENDENCIES ==="
        python -m pip install --upgrade pip
        pip install pyinstaller requests openpyxl Pillow
        Write-Host "✅ Dependencies installed"
    
    - name: Build EXE
      id: build
      run: |
        Write-Host "`n=== BUILDING EXE ==="
        
        if (-not (Test-Path "pdd_tool")) {
          Write-Host "ERROR: pdd_tool directory not found!"
          exit 1
        }
        
        Set-Location pdd_tool
        Write-Host "Working directory: $(Get-Location)"
        
        Write-Host "`n=== FILES IN DIRECTORY ==="
        Get-ChildItem | ForEach-Object { Write-Host "  $($_.Name)" }
        
        Write-Host "`n=== RUNNING PYINSTALLER ==="
        $env:PYTHONUTF8 = "1"
        $env:PYTHONIOENCODING = "utf-8"
        
        pyinstaller --onefile --name parse_to_excel_v4 parse_to_excel_gui_v4.py --clean
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "`n✅ BUILD SUCCESSFUL!"
          Write-Host "`n=== GENERATED FILES ==="
          if (Test-Path "dist") {
            Get-ChildItem "dist" | ForEach-Object {
              Write-Host "  $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
            }
          }
        } else {
          Write-Host "`n❌ BUILD FAILED!"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parse_to_excel_v4
        path: pdd_tool/dist/parse_to_excel_v4.exe
        retention-days: 30
        if-no-files-found: error
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: pdd_tool/dist/parse_to_excel_v4.exe
        generate_release_notes: true
        draft: false
        make_latest: true
