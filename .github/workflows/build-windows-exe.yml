name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: List files
      run: |
        Write-Host "=== Current Directory ==="
        Get-Location
        Write-Host "=== Root Files ==="
        Get-ChildItem -Force | Select-Object -First 20 Name
        Write-Host "=== pdd_tool Directory ==="
        if (Test-Path "pdd_tool") {
          Get-ChildItem pdd_tool | Select-Object Name
        } else {
          Write-Host "ERROR: pdd_tool directory not found!"
          exit 1
        }
    
    - name: Install dependencies
      run: |
        Write-Host "=== Installing dependencies ==="
        python -m pip install --upgrade pip
        pip install pyinstaller requests openpyxl Pillow
        Write-Host "=== Dependencies installed ==="
    
    - name: Build EXE
      run: |
        Write-Host "=== Starting build ==="
        Set-Location pdd_tool
        Write-Host "Working directory: $(Get-Location)"
        Write-Host "Files in directory:"
        Get-ChildItem | Select-Object Name
        
        Write-Host "`n=== Running PyInstaller ==="
        $env:PYTHONIOENCODING = "utf-8"
        pyinstaller --onefile --name parse_to_excel_v4 parse_to_excel_gui_v4.py --clean 2>&1 | Tee-Object -Variable buildLog
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "`n✅ Build successful!"
          Write-Host "Generated files:"
          Get-ChildItem dist\ | Select-Object Name, Length
        } else {
          Write-Host "`n❌ Build failed!"
          Write-Host "Build log:"
          $buildLog
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parse_to_excel_v4
        path: pdd_tool/dist/parse_to_excel_v4.exe
        retention-days: 30
        if-no-files-found: error
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: pdd_tool/dist/parse_to_excel_v4.exe
        generate_release_notes: true
