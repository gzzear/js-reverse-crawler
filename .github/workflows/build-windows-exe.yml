name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Find project directory
      run: |
        $projectPath = Get-ChildItem -Recurse -Filter "parse_to_excel_gui_v4.py" | Select-Object -First 1 -ExpandProperty DirectoryName
        Write-Host "Found project at: $projectPath"
        echo "PROJECT_PATH=$projectPath" >> $env:GITHUB_ENV
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests openpyxl Pillow
    
    - name: Build EXE
      run: |
        Write-Host "Building in: ${{ env.PROJECT_PATH }}"
        Set-Location "${{ env.PROJECT_PATH }}"
        pyinstaller --onefile --name parse_to_excel_v4 parse_to_excel_gui_v4.py --clean
    
    - name: Find EXE
      run: |
        $exePath = Get-ChildItem -Recurse -Filter "parse_to_excel_v4.exe" | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Found EXE at: $exePath"
        echo "EXE_PATH=$exePath" >> $env:GITHUB_ENV
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parse_to_excel_v4
        path: ${{ env.EXE_PATH }}
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.EXE_PATH }}
        generate_release_notes: true
