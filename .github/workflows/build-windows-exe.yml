name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests openpyxl Pillow
    
    - name: Build EXE
      run: |
        Set-Location pdd_tool
        Write-Host "Building in: $(pwd)"
        pyinstaller --onefile --name parse_to_excel_v4 parse_to_excel_gui_v4.py --clean
        Write-Host "Build complete!"
        Get-ChildItem dist\
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parse_to_excel_v4
        path: pdd_tool/dist/parse_to_excel_v4.exe
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: pdd_tool/dist/parse_to_excel_v4.exe
        generate_release_notes: true
